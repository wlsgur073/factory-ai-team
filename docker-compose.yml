services:
  platform:
    build:
      context: .
      dockerfile: apps/platform/Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - NODE_ENV=production

  codex-web:
    build:
      context: .
      dockerfile: solutions/codex/web/Dockerfile
    restart: unless-stopped
    expose:
      - "5001"
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    ports:
      - "5080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - platform
      - codex-web
    restart: unless-stopped
